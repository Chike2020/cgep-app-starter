name: HIPAA Compliance Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Daily scheduled evidence collection at 02:00 UTC
    - cron: "0 2 * * *"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  compliance-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::973191046894:role/cgep-grc-gate
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ./terraform
        run: |
          terraform plan -out=tfplan
          terraform show -json tfplan > plan.json

      - name: Install Conftest
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.55.0/conftest_0.55.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.55.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: Policy Check (Conftest)
        id: conftest
        working-directory: ./terraform
        run: |
          conftest test plan.json -p ../policies/hipaa/ --all-namespaces --output json | tee ../conftest-results.json
          # Exit non-zero if any violations found (conftest already does this, but be explicit)
          conftest test plan.json -p ../policies/hipaa/ --all-namespaces

      - name: Run Python Unit Tests (drift detector)
        run: |
          pip install pytest boto3 botocore
          pytest tests/test_drift_detector.py -v 2>&1 | tee python-test-results.txt

      - name: Run OPA Unit Tests
        run: |
          # Install OPA for policy unit tests
          curl -sL https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static -o /tmp/opa
          chmod +x /tmp/opa
          sudo mv /tmp/opa /usr/local/bin/opa
          opa test policies/hipaa/ -v 2>&1 | tee opa-test-results.txt

      - name: Upload Scan Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-scan-results-${{ github.run_id }}
          path: |
            conftest-results.json
            opa-test-results.txt
            python-test-results.txt
            terraform/plan.json
          retention-days: 90

      - name: Terraform Apply
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'schedule'
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan

      - name: Install Cosign
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'schedule'
        uses: sigstore/cosign-installer@v3

      - name: Bundle and Sign Evidence
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'schedule'
        working-directory: ./terraform
        run: |
          mkdir -p evidence
          cp plan.json evidence/
          cp ../conftest-results.json evidence/ 2>/dev/null || true
          cp ../opa-test-results.txt evidence/ 2>/dev/null || true
          cp ../python-test-results.txt evidence/ 2>/dev/null || true

          BUNDLE_NAME="evidence-${{ github.run_id }}-${{ github.sha }}.tar.gz"
          tar -czf "$BUNDLE_NAME" evidence/

          sha256sum "$BUNDLE_NAME" | awk '{print $1}' > "$BUNDLE_NAME.sha256"

          cosign sign-blob "$BUNDLE_NAME" \
            --bundle "$BUNDLE_NAME.sig.bundle" \
            --yes

          echo "{\"run_id\":\"${{ github.run_id }}\",\"sha\":\"${{ github.sha }}\",\"trigger\":\"${{ github.event_name }}\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > receipt.json

      - name: Upload to Evidence Vault
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'schedule'
        working-directory: ./terraform
        run: |
          VAULT_BUCKET=$(terraform output -raw evidence_vault_bucket)
          RUN_PATH="runs/${{ github.run_id }}"
          BUNDLE_NAME="evidence-${{ github.run_id }}-${{ github.sha }}.tar.gz"

          aws s3 cp "$BUNDLE_NAME"            "s3://$VAULT_BUCKET/$RUN_PATH/" --storage-class STANDARD
          aws s3 cp "$BUNDLE_NAME.sha256"     "s3://$VAULT_BUCKET/$RUN_PATH/" --storage-class STANDARD
          aws s3 cp "$BUNDLE_NAME.sig.bundle" "s3://$VAULT_BUCKET/$RUN_PATH/" --storage-class STANDARD
          aws s3 cp receipt.json              "s3://$VAULT_BUCKET/$RUN_PATH/" --storage-class STANDARD

          echo "Evidence uploaded to s3://$VAULT_BUCKET/$RUN_PATH/"
